name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project AIKeyboard.xcodeproj \
            -scheme AIKeyboard \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          set -e
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)
          echo "App bundle: $APP_PATH"
          if [ -z "$APP_PATH" ]; then echo "No .app produced"; exit 1; fi
          echo "Embedded extensions:"; ls -la "$APP_PATH/PlugIns" || echo "(none)"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -y -X AIKeyboard-unsigned.ipa Payload >/dev/null
          echo "Built:"; ls -lh AIKeyboard-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AIKeyboard-unsigned-ipa
          path: AIKeyboard-unsigned.ipa
          if-no-files-found: error
